name: Update Profile README

on:
  schedule:
    # Runs once a day at 03:00 UTC (~05:00 SAST)
    - cron: '0 3 * * *'
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Recent Activity section
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Reidex123
          COMMIT_MSG: "chore: update recent activity"
          MAX_LINES: "5"
